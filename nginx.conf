# Internal Nginx config for the Vite SPA (user frontend)
# This config handles SPA client-side routing fallback
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable caching for HTML (ensures fresh SPA index)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback to index.html for SPA client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
